[build]
  command = "npm run build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://annaiapp-com.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/camping"
  to = "https://camping.annaiapp.com"
  status = 301
  force = true

[[redirects]]
  from = "/camping/*"
  to = "https://camping.annaiapp.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/terms-of-service"
  to = "/terms-of-service/index.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy/index.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support/index.html"
  status = 200

[[redirects]]
  from = "/account-deletion"
  to = "/account-deletion/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
